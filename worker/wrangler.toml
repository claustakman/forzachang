name = "forzachang-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[[d1_databases]]
binding = "DB"
database_name = "forzachang-db"
database_id = "REPLACE_WITH_YOUR_D1_ID"

[vars]
APP_URL = "https://forzachang.pages.dev"

# Secrets (set via wrangler secret put):
# JWT_SECRET
# RESEND_API_KEY

[triggers]
crons = ["0 9 * * *"]  # Run daily at 09:00 UTC (reminder check)
