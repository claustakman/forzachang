name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-worker:
    name: Deploy Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
        working-directory: worker
      - name: Create R2 bucket (idempotent)
        run: npx wrangler r2 bucket create forzachang-avatars 2>&1 || true
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Migrate DB — players columns
        run: |
          npx wrangler d1 execute forzachang-db --command "ALTER TABLE players ADD COLUMN avatar_url TEXT;" --remote 2>&1 || true
          npx wrangler d1 execute forzachang-db --command "ALTER TABLE players ADD COLUMN alias TEXT;" --remote 2>&1 || true
          npx wrangler d1 execute forzachang-db --remote --command "CREATE TABLE IF NOT EXISTS login_log (id TEXT PRIMARY KEY, player_id TEXT NOT NULL REFERENCES players(id) ON DELETE CASCADE, ip TEXT, created_at TEXT NOT NULL DEFAULT (datetime('now')));" 2>&1 || true
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Migrate DB — fase 3 tabeller
        run: |
          npx wrangler d1 execute forzachang-db --remote --command "
            CREATE TABLE IF NOT EXISTS events (
              id TEXT PRIMARY KEY,
              type TEXT NOT NULL DEFAULT 'kamp',
              title TEXT NOT NULL,
              description TEXT,
              location TEXT,
              start_time TEXT NOT NULL,
              end_time TEXT,
              meeting_time TEXT,
              signup_deadline TEXT,
              status TEXT NOT NULL DEFAULT 'aktiv',
              webcal_uid TEXT UNIQUE,
              season INTEGER NOT NULL,
              result TEXT,
              created_by TEXT REFERENCES players(id),
              created_at TEXT NOT NULL DEFAULT (datetime('now'))
            );
          " 2>&1 || true
          npx wrangler d1 execute forzachang-db --remote --command "
            CREATE TABLE IF NOT EXISTS event_signups (
              id TEXT PRIMARY KEY,
              event_id TEXT NOT NULL REFERENCES events(id) ON DELETE CASCADE,
              player_id TEXT NOT NULL REFERENCES players(id) ON DELETE CASCADE,
              status TEXT NOT NULL DEFAULT 'tilmeldt',
              message TEXT,
              created_at TEXT NOT NULL DEFAULT (datetime('now')),
              UNIQUE(event_id, player_id)
            );
          " 2>&1 || true
          npx wrangler d1 execute forzachang-db --remote --command "
            CREATE TABLE IF NOT EXISTS event_organizers (
              event_id TEXT NOT NULL REFERENCES events(id) ON DELETE CASCADE,
              player_id TEXT NOT NULL REFERENCES players(id) ON DELETE CASCADE,
              PRIMARY KEY (event_id, player_id)
            );
          " 2>&1 || true
          npx wrangler d1 execute forzachang-db --remote --command "
            CREATE TABLE IF NOT EXISTS app_settings (
              key TEXT PRIMARY KEY,
              value TEXT NOT NULL,
              updated_at TEXT NOT NULL DEFAULT (datetime('now'))
            );
          " 2>&1 || true
          npx wrangler d1 execute forzachang-db --remote --command "
            CREATE TABLE IF NOT EXISTS event_guests (
              id TEXT PRIMARY KEY,
              event_id TEXT NOT NULL REFERENCES events(id) ON DELETE CASCADE,
              name TEXT NOT NULL,
              added_by TEXT NOT NULL REFERENCES players(id),
              created_at TEXT NOT NULL DEFAULT (datetime('now'))
            );
          " 2>&1 || true
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - run: npx wrangler deploy
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      - run: npx wrangler pages deploy dist --project-name=forzachang
        working-directory: frontend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
