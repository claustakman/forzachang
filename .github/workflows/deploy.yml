name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-worker:
    name: Deploy Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
        working-directory: worker
      - name: Create R2 bucket (idempotent)
        run: npx wrangler r2 bucket create forzachang-avatars 2>&1 || true
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Migrate DB — players columns
        run: |
          npx wrangler d1 execute forzachang-db --command "ALTER TABLE players ADD COLUMN avatar_url TEXT;" --remote 2>&1 || true
          npx wrangler d1 execute forzachang-db --command "ALTER TABLE players ADD COLUMN alias TEXT;" --remote 2>&1 || true
          npx wrangler d1 execute forzachang-db --command "ALTER TABLE players ADD COLUMN last_seen TEXT;" --remote 2>&1 || true
          npx wrangler d1 execute forzachang-db --remote --command "CREATE TABLE IF NOT EXISTS login_log (id TEXT PRIMARY KEY, player_id TEXT NOT NULL REFERENCES players(id) ON DELETE CASCADE, ip TEXT, created_at TEXT NOT NULL DEFAULT (datetime('now')));" 2>&1 || true
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Migrate DB — fase 3 tabeller
        run: |
          npx wrangler d1 execute forzachang-db --remote --command "
            CREATE TABLE IF NOT EXISTS events (
              id TEXT PRIMARY KEY,
              type TEXT NOT NULL DEFAULT 'kamp',
              title TEXT NOT NULL,
              description TEXT,
              location TEXT,
              start_time TEXT NOT NULL,
              end_time TEXT,
              meeting_time TEXT,
              signup_deadline TEXT,
              status TEXT NOT NULL DEFAULT 'aktiv',
              webcal_uid TEXT UNIQUE,
              season INTEGER NOT NULL,
              result TEXT,
              created_by TEXT REFERENCES players(id),
              created_at TEXT NOT NULL DEFAULT (datetime('now'))
            );
          " 2>&1 || true
          npx wrangler d1 execute forzachang-db --remote --command "
            CREATE TABLE IF NOT EXISTS event_signups (
              id TEXT PRIMARY KEY,
              event_id TEXT NOT NULL REFERENCES events(id) ON DELETE CASCADE,
              player_id TEXT NOT NULL REFERENCES players(id) ON DELETE CASCADE,
              status TEXT NOT NULL DEFAULT 'tilmeldt',
              message TEXT,
              created_at TEXT NOT NULL DEFAULT (datetime('now')),
              UNIQUE(event_id, player_id)
            );
          " 2>&1 || true
          npx wrangler d1 execute forzachang-db --remote --command "
            CREATE TABLE IF NOT EXISTS event_organizers (
              event_id TEXT NOT NULL REFERENCES events(id) ON DELETE CASCADE,
              player_id TEXT NOT NULL REFERENCES players(id) ON DELETE CASCADE,
              PRIMARY KEY (event_id, player_id)
            );
          " 2>&1 || true
          npx wrangler d1 execute forzachang-db --remote --command "
            CREATE TABLE IF NOT EXISTS app_settings (
              key TEXT PRIMARY KEY,
              value TEXT NOT NULL,
              updated_at TEXT NOT NULL DEFAULT (datetime('now'))
            );
          " 2>&1 || true
          npx wrangler d1 execute forzachang-db --remote --command "
            CREATE TABLE IF NOT EXISTS event_guests (
              id TEXT PRIMARY KEY,
              event_id TEXT NOT NULL REFERENCES events(id) ON DELETE CASCADE,
              name TEXT NOT NULL,
              added_by TEXT NOT NULL REFERENCES players(id),
              created_at TEXT NOT NULL DEFAULT (datetime('now'))
            );
          " 2>&1 || true
          npx wrangler d1 execute forzachang-db --remote --command "
            CREATE TABLE IF NOT EXISTS reminder_log (
              id TEXT PRIMARY KEY,
              event_id TEXT NOT NULL REFERENCES events(id) ON DELETE CASCADE,
              player_id TEXT NOT NULL REFERENCES players(id) ON DELETE CASCADE,
              sent_at TEXT NOT NULL DEFAULT (datetime('now')),
              type TEXT NOT NULL DEFAULT 'auto',
              UNIQUE(event_id, player_id, type)
            );
          " 2>&1 || true
          npx wrangler d1 execute forzachang-db --remote --command "
            CREATE TABLE IF NOT EXISTS match_stats (
              id TEXT PRIMARY KEY,
              event_id TEXT NOT NULL REFERENCES events(id) ON DELETE CASCADE,
              player_id TEXT NOT NULL REFERENCES players(id) ON DELETE CASCADE,
              goals INTEGER NOT NULL DEFAULT 0,
              yellow_cards INTEGER NOT NULL DEFAULT 0,
              red_cards INTEGER NOT NULL DEFAULT 0,
              mom INTEGER NOT NULL DEFAULT 0,
              played INTEGER NOT NULL DEFAULT 1,
              late_signup INTEGER NOT NULL DEFAULT 0,
              absence INTEGER NOT NULL DEFAULT 0,
              created_at TEXT NOT NULL DEFAULT (datetime('now')),
              UNIQUE(event_id, player_id)
            );
          " 2>&1 || true
          npx wrangler d1 execute forzachang-db --remote --command "ALTER TABLE match_stats ADD COLUMN late_signup INTEGER NOT NULL DEFAULT 0;" 2>&1 || true
          npx wrangler d1 execute forzachang-db --remote --command "ALTER TABLE match_stats ADD COLUMN absence INTEGER NOT NULL DEFAULT 0;" 2>&1 || true
          npx wrangler d1 execute forzachang-db --remote --command "
            CREATE TABLE IF NOT EXISTS player_stats_legacy (
              id TEXT PRIMARY KEY,
              player_id TEXT NOT NULL REFERENCES players(id) ON DELETE CASCADE,
              season INTEGER NOT NULL,
              matches INTEGER NOT NULL DEFAULT 0,
              goals INTEGER NOT NULL DEFAULT 0,
              mom INTEGER NOT NULL DEFAULT 0,
              yellow_cards INTEGER NOT NULL DEFAULT 0,
              red_cards INTEGER NOT NULL DEFAULT 0,
              fines_amount INTEGER NOT NULL DEFAULT 0,
              UNIQUE(player_id, season)
            );
          " 2>&1 || true
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Migrate DB — fase 6 bødekasse
        run: |
          npx wrangler d1 execute forzachang-db --remote --command "
            CREATE TABLE IF NOT EXISTS fine_types (
              id TEXT PRIMARY KEY,
              name TEXT NOT NULL,
              amount INTEGER NOT NULL,
              auto_assign TEXT,
              active INTEGER NOT NULL DEFAULT 1,
              sort_order INTEGER NOT NULL DEFAULT 0,
              created_at TEXT NOT NULL DEFAULT (datetime('now'))
            );
          " 2>&1 || true
          npx wrangler d1 execute forzachang-db --remote --command "ALTER TABLE fine_types ADD COLUMN auto_assign TEXT;" 2>&1 || true
          npx wrangler d1 execute forzachang-db --remote --command "ALTER TABLE fine_types ADD COLUMN sort_order INTEGER NOT NULL DEFAULT 0;" 2>&1 || true
          npx wrangler d1 execute forzachang-db --remote --command "ALTER TABLE fine_types ADD COLUMN active INTEGER NOT NULL DEFAULT 1;" 2>&1 || true
          npx wrangler d1 execute forzachang-db --remote --command "
            CREATE TABLE IF NOT EXISTS fines (
              id TEXT PRIMARY KEY,
              player_id TEXT NOT NULL REFERENCES players(id) ON DELETE CASCADE,
              fine_type_id TEXT NOT NULL REFERENCES fine_types(id),
              event_id TEXT REFERENCES events(id) ON DELETE SET NULL,
              amount INTEGER NOT NULL,
              note TEXT,
              assigned_by TEXT NOT NULL REFERENCES players(id),
              created_at TEXT NOT NULL DEFAULT (datetime('now')),
              UNIQUE(player_id, fine_type_id, event_id)
            );
          " 2>&1 || true
          npx wrangler d1 execute forzachang-db --remote --command "DROP TABLE IF EXISTS fines;" 2>&1 || true
          npx wrangler d1 execute forzachang-db --remote --command "
            CREATE TABLE IF NOT EXISTS fines (
              id TEXT PRIMARY KEY,
              player_id TEXT NOT NULL REFERENCES players(id) ON DELETE CASCADE,
              fine_type_id TEXT NOT NULL REFERENCES fine_types(id),
              event_id TEXT REFERENCES events(id) ON DELETE SET NULL,
              amount INTEGER NOT NULL,
              note TEXT,
              assigned_by TEXT NOT NULL REFERENCES players(id),
              created_at TEXT NOT NULL DEFAULT (datetime('now')),
              UNIQUE(player_id, fine_type_id, event_id)
            );
          " 2>&1 || true
          npx wrangler d1 execute forzachang-db --remote --command "
            CREATE TABLE IF NOT EXISTS fine_payments (
              id TEXT PRIMARY KEY,
              player_id TEXT NOT NULL REFERENCES players(id) ON DELETE CASCADE,
              amount INTEGER NOT NULL,
              note TEXT,
              registered_by TEXT NOT NULL REFERENCES players(id),
              created_at TEXT NOT NULL DEFAULT (datetime('now'))
            );
          " 2>&1 || true
          npx wrangler d1 execute forzachang-db --remote --command "DELETE FROM fine_types;" 2>&1 || true
          npx wrangler d1 execute forzachang-db --remote --command "INSERT INTO fine_types (id, name, amount, auto_assign, active, sort_order) VALUES ('ft-red-direct',    'Direkte rødt kort',                      240, NULL,          1,  1);" 2>&1 || true
          npx wrangler d1 execute forzachang-db --remote --command "INSERT INTO fine_types (id, name, amount, auto_assign, active, sort_order) VALUES ('ft-absence',       'Udeblivelse fra kamp',                   240, NULL,          1,  2);" 2>&1 || true
          npx wrangler d1 execute forzachang-db --remote --command "INSERT INTO fine_types (id, name, amount, auto_assign, active, sort_order) VALUES ('ft-two-yellows',   'To gule kort i samme kamp',              180, NULL,          1,  3);" 2>&1 || true
          npx wrangler d1 execute forzachang-db --remote --command "INSERT INTO fine_types (id, name, amount, auto_assign, active, sort_order) VALUES ('ft-no-reply',      'Manglende udmelding til kamp',           160, 'no_signup',   1,  4);" 2>&1 || true
          npx wrangler d1 execute forzachang-db --remote --command "INSERT INTO fine_types (id, name, amount, auto_assign, active, sort_order) VALUES ('ft-yellow-behav',  'Gult kort for brok eller opførsel',      120, NULL,          1,  5);" 2>&1 || true
          npx wrangler d1 execute forzachang-db --remote --command "INSERT INTO fine_types (id, name, amount, auto_assign, active, sort_order) VALUES ('ft-matchday-off',  'Afbud på kampdag',                       120, NULL,          1,  6);" 2>&1 || true
          npx wrangler d1 execute forzachang-db --remote --command "INSERT INTO fine_types (id, name, amount, auto_assign, active, sort_order) VALUES ('ft-late-arrive',   'Fremmøde efter kampstart',               120, NULL,          1,  7);" 2>&1 || true
          npx wrangler d1 execute forzachang-db --remote --command "INSERT INTO fine_types (id, name, amount, auto_assign, active, sort_order) VALUES ('ft-late-signup',   'For sen udmelding (efter frist)',          80, 'late_signup', 1,  8);" 2>&1 || true
          npx wrangler d1 execute forzachang-db --remote --command "INSERT INTO fine_types (id, name, amount, auto_assign, active, sort_order) VALUES ('ft-yellow',        'Gult kort',                               60, NULL,          1,  9);" 2>&1 || true
          npx wrangler d1 execute forzachang-db --remote --command "INSERT INTO fine_types (id, name, amount, auto_assign, active, sort_order) VALUES ('ft-late-show',     'For sent fremmøde',                       60, NULL,          1, 10);" 2>&1 || true
          npx wrangler d1 execute forzachang-db --remote --command "INSERT INTO fine_types (id, name, amount, auto_assign, active, sort_order) VALUES ('ft-disciplinary',  'Disciplinærstraf',                        60, NULL,          1, 11);" 2>&1 || true
          npx wrangler d1 execute forzachang-db --remote --command "INSERT INTO fine_types (id, name, amount, auto_assign, active, sort_order) VALUES ('ft-bad-action',    'Elendig aktion (min. 4 stemmer)',         60, NULL,          1, 12);" 2>&1 || true
          npx wrangler d1 execute forzachang-db --remote --command "INSERT INTO fine_types (id, name, amount, auto_assign, active, sort_order) VALUES ('ft-kenneth',       'Afbud til kamp (Kennethgebyr)',           30, 'absence',     1, 13);" 2>&1 || true
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - run: npx wrangler deploy
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      - run: npx wrangler pages deploy dist --project-name=forzachang
        working-directory: frontend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
